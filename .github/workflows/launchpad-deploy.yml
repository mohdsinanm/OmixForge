name: Launchpad PPA Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'Release-*'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            python3-dev \
            python3-venv \
            build-essential \
            dpkg-dev \
            debhelper \
            dh-python \
            python3-all \
            pybuild-plugin-pyproject \
            python3-setuptools \
            python3-wheel \
            python3-poetry-core \
            python3-pyqt6 \
            python3-pandas \
            python3-numpy \
            python3-matplotlib \
            python3-bs4 \
            python3-biopython \
            python3-requests \
            dput

      - name: Install Python deps
        run: make configure

      - name: Build Debian source package
        run: |
          chmod +x scripts/build-debian-source.sh
          scripts/build-debian-source.sh

      - name: Configure dput for Launchpad
        run: |
          mkdir -p ~/.dput
          cat > ~/.dput.cf <<'EOF'
          [ppa]
          method = ftp
          fqdn = ppa.launchpad.net
          incoming = /~%(ppa)s/ubuntu/
          login = anonymous
          allow_unsigned_uploads = 1
          EOF

      - name: Upload source package to Launchpad PPA
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
        run: |
          if [ -z "${LAUNCHPAD_PPA:-}" ]; then
            echo "ERROR: secret LAUNCHPAD_PPA is not set"
            exit 1
          fi
          dput ppa:$LAUNCHPAD_PPA omixforge_*_source.changes
